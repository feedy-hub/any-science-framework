        <rect x="17" y="17" width="44" height="44" rx="12" fill="#52D6FF" fill-opacity="0.11"/>
        <path d="M29 48V42M38 48V34M47 48V38M56 48V29" stroke="#73DFFF" stroke-width="2.5" stroke-linecap="round"/>
        <text x="76" y="34" fill="#F2FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">Evidence &amp; State</text>
        <text x="76" y="55" fill="#8FA6BF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12.5">Persist the outcome</text>
