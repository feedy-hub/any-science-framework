        <path d="M31 41H47M39 33V49" stroke="#65DFFF" stroke-width="2.5" stroke-linecap="round"/>
        <text x="76" y="34" fill="#F2FAFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">Idea Card</text>
