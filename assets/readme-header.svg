        <path d="M29 48L39 34L49 43L55 35" stroke="#91A6FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="76" y="34" fill="#F3F5FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">Experiment</text>
        <text x="76" y="55" fill="#929FBE" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12.5">Plan &amp; execute</text>
      </g>

      <g transform="translate(106 202)">
        <rect width="210" height="78" rx="18" fill="#151A34" stroke="#A47CFF" stroke-opacity="0.48"/>
        <rect x="17" y="17" width="44" height="44" rx="12" fill="#A47CFF" fill-opacity="0.12"/>
        <path d="M29 39L37 47L51 31" stroke="#B89AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="76" y="34" fill="#F7F3FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">Review Gate</text>
        <text x="76" y="55" fill="#A09AB9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12.5">Check evidence</text>
