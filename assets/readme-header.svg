<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="30" x2="1510" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.48" stop-color="#101A32"/>
      <stop offset="1" stop-color="#15102B"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(315 280) rotate(21) scale(380 300)">
      <stop stop-color="#4FD1FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4FD1FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 140) rotate(148) scale(430 310)">
      <stop stop-color="#9A7CFF" stop-opacity="0.23"/>
      <stop offset="1" stop-color="#9A7CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#52D6FF"/>
      <stop offset="0.52" stop-color="#6D9BFF"/>
      <stop offset="1" stop-color="#A47CFF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
