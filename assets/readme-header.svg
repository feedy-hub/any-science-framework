    <rect x="20" y="20" width="1560" height="520" rx="34" fill="url(#glowA)"/>
    <rect x="20" y="20" width="1560" height="520" rx="34" fill="url(#glowB)"/>
    <rect x="20" y="20" width="1560" height="520" rx="34" fill="url(#dots)"/>

    <!-- Decorative orbital paths -->
    <path d="M-40 454C210 316 334 486 584 344C834 202 944 258 1124 160C1304 62 1472 113 1660 15" stroke="url(#accent)" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M-80 484C180 344 328 545 620 380C858 245 1050 346 1240 226C1430 106 1526 142 1684 54" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

    <!-- Left research nucleus -->
    <g transform="translate(92 103)" filter="url(#shadow)">
      <rect x="0" y="0" width="310" height="354" rx="28" fill="#08101F" fill-opacity="0.68" stroke="#A6D9FF" stroke-opacity="0.17"/>
      <rect x="18" y="18" width="274" height="318" rx="22" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.08"/>

      <text x="42" y="58" fill="#9BB3CB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="2.4">RESEARCH WORKSPACE</text>
      <circle cx="155" cy="176" r="63" fill="#14213D" stroke="url(#accent)" stroke-width="2.5"/>
