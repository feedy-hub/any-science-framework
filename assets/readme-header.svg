      <text x="2" y="224" fill="#B8C8DA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="450">Turn AI-assisted research into a structured, reviewable,</text>
      <text x="2" y="254" fill="#B8C8DA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21" font-weight="450">and reproducible workflow.</text>

