      <path d="M155 113L102 82M155 113L210 81M92 177L48 177M218 176L264 176M155 239L107 275M155 239L211 274" stroke="#90CBFF" stroke-opacity="0.62" stroke-width="2"/>
      <circle cx="102" cy="82" r="12" fill="#0F1A30" stroke="#65D7FF" stroke-width="2"/>
      <circle cx="210" cy="81" r="12" fill="#0F1A30" stroke="#8D9DFF" stroke-width="2"/>
      <circle cx="48" cy="177" r="12" fill="#0F1A30" stroke="#65D7FF" stroke-width="2"/>
      <circle cx="264" cy="176" r="12" fill="#0F1A30" stroke="#AB7DFF" stroke-width="2"/>
      <circle cx="107" cy="275" r="12" fill="#0F1A30" stroke="#79BCFF" stroke-width="2"/>
