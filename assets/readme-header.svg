      <text x="424" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">RUN</text>
      <line x1="464" y1="-5" x2="514" y2="-5" stroke="#9B81FF" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="518" cy="-5" r="3" fill="#9B81FF"/>
      <text x="538" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">EVIDENCE</text>
      <line x1="624" y1="-5" x2="674" y2="-5" stroke="#A47CFF" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="678" cy="-5" r="3" fill="#A47CFF"/>
      <text x="698" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">ITERATE</text>
