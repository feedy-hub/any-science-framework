      <text x="0" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">IDEA</text>
      <line x1="52" y1="-5" x2="102" y2="-5" stroke="#4FD1FF" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="106" cy="-5" r="3" fill="#4FD1FF"/>
      <text x="126" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">DESIGN</text>
      <line x1="202" y1="-5" x2="252" y2="-5" stroke="#699FFF" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="256" cy="-5" r="3" fill="#699FFF"/>
      <text x="276" y="0" fill="#7F94AA" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="1.7">REVIEW</text>
      <line x1="350" y1="-5" x2="400" y2="-5" stroke="#858CFF" stroke-opacity="0.55" stroke-width="2"/>
